name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          # cc5_aarch64 packaging changed across the 5.7.x line: pre-5.7.48
          # tarballs ship it under bin/ (picked up by the bin/* copy above),
          # 5.7.48+ moved it to the tarball top-level. Cover both. See
          # docs/development/issues/2026-04-30-cyrius-cc5-aarch64-packaging.md.
          [ -f "$CYRIUS_DIR/cc5_aarch64" ] && cp "$CYRIUS_DIR/cc5_aarch64" "$HOME/.cyrius/bin/"
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        run: cyrius deps --verify

      - name: Lint
        # Auto-discover so new modules are covered without editing CI.
        # Treat any warning as a failure (fail on any cyrlint "  warn " line).
        run: |
          fail=0
          for f in src/*.cyr programs/*.cyr tests/tcyr/*.tcyr tests/bcyr/*.bcyr fuzz/*.fcyr; do
            out=$(cyrius lint "$f" 2>&1)
            echo "$out"
            if echo "$out" | grep -qE '^\s*warn '; then
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Format check
        # `cyrius fmt <file>` (no flag) prints the formatted source to
        # stdout; diff against the committed file to enforce no drift.
        # Pre-2.2.2 this used `--check` but cyrius's `--check` mode is
        # exit-code-only and emits no stdout, so the diff always fired
        # spuriously — bumped to canonical invocation at 2.2.2 ship.
        run: |
          fail=0
          for f in src/*.cyr programs/*.cyr tests/tcyr/*.tcyr tests/bcyr/*.bcyr fuzz/*.fcyr; do
            if ! diff -q <(cyrius fmt "$f" 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Vet
        run: cyrius vet src/main.cyr

      - name: Verify dist bundles are in sync with src/
        run: |
          cyrius distlib
          cyrius distlib core
          fail=0
          for bundle in dist/yukti.cyr dist/yukti-core.cyr; do
            if ! git diff --quiet "$bundle"; then
              echo "ERROR: $bundle is stale. Run 'cyrius distlib [core]' and commit the result."
              git --no-pager diff "$bundle" | head -40
              fail=1
            fi
          done
          [ $fail -eq 0 ] || exit 1
          echo "dist bundles match src/"

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/yukti
          echo "yukti: $(wc -c < build/yukti) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/yukti | grep -q "7f45 4c46"

      - name: Cross-build aarch64
        # 2.1.3 unblocked aarch64 cross-builds: yukti src/ migrated 30
        # raw SYS_OPEN/SYS_CLOSE/SYS_UNLINK callers to the stdlib's
        # arch-translating sys_open/sys_close/sys_unlink wrappers, and
        # patra 1.9.2 (bumped from 1.1.1) did the same on its side.
        # Cyrius 5.7.43+ ships cc5_aarch64 in the x86_64 release bundle.
        # The remaining direct syscall callers (clock_gettime, mount,
        # socket, write, exit, stat, mkdir) still use raw arch-divergent
        # syscall numbers and are RUNTIME-INCORRECT on aarch64 — but
        # that's the held-aarch64 retest work, separate from this gate.
        # See docs/development/issues/2026-04-19-cc5-aarch64-repro.md.
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cc5_aarch64" ]; then
            echo "::error::cc5_aarch64 missing from Cyrius $CYRIUS_VERSION — aarch64 cross-build is required since 2.1.3"
            exit 1
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 src/main.cyr build/yukti-aarch64
          CYRIUS_DCE=1 cyrius build --aarch64 programs/core_smoke.cyr build/core_smoke-aarch64
          for f in fuzz/*.fcyr; do
            name=$(basename "$f" .fcyr)
            CYRIUS_DCE=1 cyrius build --aarch64 "$f" "build/${name}-aarch64"
          done
          for bin in build/yukti-aarch64 build/core_smoke-aarch64 build/*-aarch64; do
            [ -f "$bin" ] || continue
            file "$bin" | grep -q "aarch64" || {
              echo "ERROR: $bin is not an aarch64 ELF"; exit 1; }
          done
          echo "yukti-aarch64: $(wc -c < build/yukti-aarch64) bytes"

      - name: Test
        run: cyrius test tests/tcyr/yukti.tcyr

      - name: Kernel-safe tripwire
        # programs/core_smoke.cyr links ONLY src/core.cyr + src/pci.cyr
        # and asserts every exported kernel-safe const/predicate. Non-zero
        # exit = something alloc/syscall-using leaked into the kernel-safe
        # subset. This must stay green for AGNOS kernel consumption.
        run: |
          CYRIUS_DCE=1 cyrius build programs/core_smoke.cyr build/core_smoke
          ./build/core_smoke

      - name: Fuzz
        run: |
          for f in fuzz/*.fcyr; do
            name=$(basename "$f" .fcyr)
            CYRIUS_DCE=1 cyrius build "$f" "build/$name"
            timeout 10 "build/$name" || { echo "FUZZ CRASH: $name"; exit 1; }
            echo "  $name: ok"
          done

      - name: Bench
        run: cyrius bench tests/bcyr/yukti.bcyr

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        # Matches code lines only — rejects patterns in # comments.
        # Use awk instead of "grep -v '# '" which would eat any line with
        # an inline comment and hide real hits.
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          # execve(59) / fork(57) / exec* family — no raw spawn without audit
          scan "raw execve"   'syscall( *59'
          scan "raw fork"     'syscall( *57'
          # sys_system in src/ requires explicit sanitization review
          scan "sys_system"   '\bsys_system\s*('
          # Hardcoded system paths that shouldn't be writable by yukti
          scan "writes to /etc"  '"/etc/'
          scan "writes to /bin"  '"/bin/'
          scan "writes to /sbin" '"/sbin/'
          # Unbounded stack buffers (>= 64KB — force heap review)
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large stack buffer ("n" bytes): "$0
            }' src/*.cyr | tee /tmp/bigbuf.txt
          [ -s /tmp/bigbuf.txt ] && FAIL=1
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (manifest pulls VERSION via \${file:VERSION})"
