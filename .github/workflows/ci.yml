name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_VERSION: "5.2.1"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "Cyrius $CYRIUS_VERSION installed"

      - name: Resolve deps
        run: cyrius deps

      - name: Verify dep hashes
        run: cyrius deps --verify

      - name: Build
        run: |
          mkdir -p build
          cat programs/demo.cyr | cc5 > build/yukti
          chmod +x build/yukti
          echo "yukti: $(wc -c < build/yukti) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/yukti | grep -q "7f45 4c46"

      - name: Unit tests
        run: |
          cat tests/tcyr/yukti.tcyr | cc5 > build/yukti_test
          chmod +x build/yukti_test
          ./build/yukti_test

      - name: Fuzz
        run: |
          for f in fuzz/*.fcyr; do
            name=$(basename "$f" .fcyr)
            cat "$f" | cc5 > "build/$name"
            chmod +x "build/$name"
            timeout 10 "build/$name" || { echo "FUZZ CRASH: $name"; exit 1; }
            echo "  $name: ok"
          done

      - name: Benchmarks
        run: |
          cat tests/bcyr/yukti.bcyr | cc5 > build/yukti_bench
          chmod +x build/yukti_bench
          ./build/yukti_bench

      - name: Bundle dist
        run: |
          cyrius distlib
          echo "dist/yukti.cyr: $(wc -l < dist/yukti.cyr) lines"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          WARN=0
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve in src/"; WARN=1
          fi
          if grep -rn '"/etc/' src/ 2>/dev/null; then
            echo "WARN: hardcoded /etc paths"; WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          grep -q "$FILE_VERSION" CHANGELOG.md || { echo "version not in changelog"; exit 1; }
          echo "Version consistent: $FILE_VERSION (manifest uses \${file:VERSION})"
