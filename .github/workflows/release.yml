name: Release

on:
  push:
    tags: ['*']

permissions:
  contents: write

env:
  CYRIUS_VERSION: "5.2.1"

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF_NAME}"
          [ "$FILE_VERSION" = "$TAG" ] || { echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          # cyrius.cyml uses ${file:VERSION} — no separate version string to
          # drift against the tag.

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Resolve deps
        run: cyrius deps

      - name: Verify dep hashes
        run: cyrius deps --verify

      - name: Build
        run: |
          mkdir -p build
          cat programs/demo.cyr | cc5 > build/yukti
          chmod +x build/yukti
          echo "yukti: $(wc -c < build/yukti) bytes"

      - name: Test
        run: |
          cat tests/tcyr/yukti.tcyr | cc5 > build/yukti_test
          chmod +x build/yukti_test
          ./build/yukti_test
          for f in fuzz/*.fcyr; do
            name=$(basename "$f" .fcyr)
            cat "$f" | cc5 > "build/$name"
            chmod +x "build/$name"
            timeout 10 "build/$name"
          done

      - name: Bundle dist
        run: cyrius distlib

      - name: Clean toolchain artifacts
        run: rm -f cyrius-*.tar.gz

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="yukti-${TAG}/" -o "yukti-${TAG}-src.tar.gz" HEAD
          sha256sum yukti-*.tar.gz > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            yukti-*.tar.gz
            dist/yukti.cyr
            cyrius.lock
            SHA256SUMS

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - name: Changelog
        run: awk "/^## \\[${GITHUB_REF_NAME}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md
      - uses: softprops/action-gh-release@v2
        with:
          name: "yukti ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') }}
          files: |
            yukti-*.tar.gz
            dist/yukti.cyr
            cyrius.lock
            SHA256SUMS
